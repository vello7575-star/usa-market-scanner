name: US Scanner

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy ta

      - name: Run scanner
        run: python scanner.py

      - name: Debug workspace
        run: |
          pwd
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanner-report
          path: report.txt
