name: US Scanner

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install yfinance pandas numpy ta

      - run: python scanner.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: scanner-report
          path: report_*.txt
