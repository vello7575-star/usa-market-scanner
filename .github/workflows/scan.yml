name: Daily US Market Scanner

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install yfinance pandas numpy ta
- name: SHOW FILES
  run: ls -R

- name: SHOW SCANNER
  run: sed -n '1,200p' scanner.py
      - run: python scanner.py

      - run: ls -la

      - name: Upload history
        uses: actions/upload-artifact@v4
        with:
          name: scanner-history
          path: history.csv
